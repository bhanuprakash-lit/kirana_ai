name: kirana_ai
description: "Mobile Application for Kirana Owners by LohiyaAI"
publish_to: 'none'
version: 1.1.1+10

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0

  # Firebase — all on firebase_core 4.x family
  firebase_core: ^4.7.0
  firebase_remote_config: ^6.4.0
  firebase_auth: ^6.4.0
  firebase_crashlytics: ^5.2.0
  firebase_performance: ^0.11.3

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.3

  # Location
  geolocator: ^14.0.2

  # Network
  http: ^1.6.0

  # Audio recording (Gemini voice order)
  record: ^5.2.0
  path_provider: ^2.1.5
  # Audio playback (udhaar voice-consent clips)
  audioplayers: ^6.1.0

  # Invoice scanning
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Bluetooth thermal printing (58 mm ESC/POS via Classic BT / SPP)
  print_bluetooth_thermal: '>=1.0.0 <1.2.2'

  # Storage
  shared_preferences: ^2.5.5

  # UI Extras
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  flutter_animate: ^4.5.2
  flutter_secure_storage: ^10.3.1
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  flutter_contacts: ^2.0.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  in_app_purchase: ^3.2.0
  intl: ^0.20.2
  package_info_plus: ^9.0.1
  device_info_plus: ^11.3.0
  home_widget: ^0.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^18.0.1
  in_app_update_flutter: ^2.0.3

  # On-device YOLO for the sale-area counter (real-time detection + tracking).
  # Consumes an Ultralytics-exported .tflite bundled under assets/models/.
  ultralytics_yolo: ^0.6.6
  tutorial_coach_mark: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# record_linux 0.7.2 is incompatible with record_platform_interface 1.5.0; force the fixed version
dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logos/
    # On-device counter model + labels (Ultralytics-exported YOLO).
    - assets/models/

  # Bundled fonts (offline, no runtime google_fonts fetch). GoogleSans is the
  # Latin/default brand face; the Noto Sans families cover the Indic scripts so
  # vernacular text never renders as tofu and never blocks first paint on a
  # network font download.
  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/GoogleSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/GoogleSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
    - family: NotoSansTelugu
      fonts:
        - asset: assets/fonts/NotoSansTelugu-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansTelugu-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansTelugu-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansTelugu-Bold.ttf
          weight: 700
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansDevanagari-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansDevanagari-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansTamil-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansTamil-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansTamil-Bold.ttf
          weight: 700
    - family: NotoSansKannada
      fonts:
        - asset: assets/fonts/NotoSansKannada-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansKannada-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansKannada-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansKannada-Bold.ttf
          weight: 700
    - family: NotoSansMalayalam
      fonts:
        - asset: assets/fonts/NotoSansMalayalam-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansMalayalam-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansMalayalam-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansMalayalam-Bold.ttf
          weight: 700
