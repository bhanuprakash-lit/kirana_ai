name: kirana_ai
description: "Mobile Application for Kirana Owners by LohiyaAI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0

  # Firebase — all on firebase_core 4.x family
  firebase_core: ^4.7.0
  firebase_remote_config: ^6.4.0
  firebase_auth: ^6.4.0
  firebase_crashlytics: ^5.2.0
  firebase_performance: ^0.11.3

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.3

  # Location
  geolocator: ^14.0.2

  # Network
  http: ^1.6.0

  # Storage
  shared_preferences: ^2.5.5

  # UI Extras
  smooth_page_indicator: ^2.0.1
  flutter_animate: ^4.5.2
  flutter_secure_storage: ^10.1.0
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  flutter_contacts: ^2.0.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  in_app_purchase: ^3.2.0
  intl: ^0.20.2
  package_info_plus: ^9.0.1
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
